name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 10 */3 * *' # ogni 3 giorni alle 10:00 UTC
  workflow_dispatch: # avvio manuale se necessario

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://aezqtgadyaxdcptwlpci.supabase.co/rest/v1/wines?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARN: risposta non 200 (possibile progetto in sleep — si risveglierà alla prossima chiamata)"
          fi
